<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#14110d" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MenuSnap">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <title>MenuSnap | Digital Menu</title>

    <style>
      /* Smooth Reset */
      html, body {
        background-color: #14110d;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      /* Premium Dot Loader (Phase 1) */
      #pre-root-loader {
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #14110d;
      }

      .dot-loader {
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 10px;
        height: 10px;
        background-color: #d97706;
        border-radius: 50%;
        animation: dot-jump 1.4s infinite ease-in-out both;
      }

      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes dot-jump {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }

      /* Once React content loads into #root, the loader is replaced */
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-root-loader">
        <div class="dot-loader">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
