<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#14110d" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MenuSnap">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>MenuSnap | Digital Menu</title>

    <style>
      /* Ensure the background is dark immediately */
      html, body {
        background-color: #14110d;
        margin: 0;
        padding: 0;
        height: 100%;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      /* This container keeps the page height stable so it doesn't "jump" */
      #initial-placeholder {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100%;
        background-color: #14110d;
      }

      /* Minimal pulse for a premium feel while JS loads */
      .loading-brand {
        color: #e8911f; /* Your brand gold */
        font-family: serif;
        font-style: italic;
        font-size: 1.1rem;
        animation: pulse 2s infinite ease-in-out;
        opacity: 0.6;
      }

      @keyframes pulse {
        0%, 100% { opacity: 0.4; transform: scale(0.98); }
        50% { opacity: 0.8; transform: scale(1); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-placeholder">
        <div class="loading-brand">MenuSnap</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
