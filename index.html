<!doctype html>
<html lang="en">
  <head>
    <style>
      body {
        background-color: #14110d;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        -webkit-tap-highlight-color: transparent;
      }

      /* THE PREMIUM DOT LOADER */
      .dot-loader {
        display: flex;
        gap: 8px;
      }

      .dot {
        width: 10px;
        height: 10px;
        background-color: #d97706; /* Your Brand Gold */
        border-radius: 50%;
        animation: dot-jump 1.4s infinite ease-in-out both;
      }

      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes dot-jump {
        0%, 80%, 100% { transform: scale(0); opacity: 0.3; }
        40% { transform: scale(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-root-loader">
        <div class="dot-loader">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
