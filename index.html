<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#14110d" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MenuSnap">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />

    <title>MenuSnap | Digital Menu</title>

    <style>
      /* Ensure the background is dark immediately to prevent white flash */
      html {
        background-color: #14110d;
      }

      body {
        background-color: #14110d !important;
        margin: 0;
        padding: 0;
        /* Critical: Removed 'height: 100vh' and 'overflow: hidden' 
           to allow your Index.tsx scroll listener to work! */
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      /* This container fills the screen ONLY until React loads */
      #pre-root-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: fixed; /* Fixed so it doesn't affect page scroll height */
        inset: 0;
        background-color: #14110d;
        z-index: 9999;
      }

      .pulse-text {
        color: #e8911f; /* Matches your brand gold */
        font-family: serif;
        font-style: italic;
        font-size: 1.2rem;
        animation: pulse 1.8s infinite ease-in-out;
      }

      @keyframes pulse {
        0% { opacity: 0.3; transform: scale(0.98); }
        50% { opacity: 1; transform: scale(1); }
        100% { opacity: 0.3; transform: scale(0.98); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="pre-root-loader">
        <div class="pulse-text">MenuSnap...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
