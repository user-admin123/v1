<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    
    <meta name="theme-color" content="#14110d" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MenuSnap">
    <meta name="application-name" content="MenuSnap">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍴</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='#14110d'/><text x='50%' y='50%' dominant-baseline='central' text-anchor='middle' font-family='serif' font-weight='bold' font-size='40' fill='#d97706'>MS</text></svg>">

    <title>MenuSnap | Explore Our Digital Menu</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
      html, body {
        background-color: #14110d;
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        -webkit-tap-highlight-color: transparent;
      }

      #pre-root-loader {
        position: fixed;
        inset: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #14110d;
        z-index: 9999;
      }

      .dot-loader {
        display: flex;
        gap: 12px;
      }

      .dot {
        width: 12px;
        height: 12px;
        background-color: #d97706;
        border-radius: 50%;
        animation: dot-jump 1.4s infinite ease-in-out both;
      }

      .dot:nth-child(1) { animation-delay: -0.32s; }
      .dot:nth-child(2) { animation-delay: -0.16s; }

      @keyframes dot-jump {
        0%, 80%, 100% { transform: scale(0.3); opacity: 0.2; }
        40% { transform: scale(1.1); opacity: 1; }
      }

      /* When React injects content, we hide the loader */
      #root:not(:empty) ~ #pre-root-loader {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="pre-root-loader">
      <div class="dot-loader">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
    </div>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
