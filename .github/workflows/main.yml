name: "MenuSnap: Cleanup & Update"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Remove unwanted packages
        run: |
          npm uninstall lovable-tagger html-to-image
          echo "Uninstalled lovable-tagger and html-to-image"

      - name: Update all dependencies to latest
        run: |
          # npx allows us to use npm-check-updates without installing it permanently
          npx npm-check-updates -u
          npm install
          echo "All packages bumped to latest and lockfile updated"

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          # Check if there are changes to commit
          if [[ -n "$(git status --porcelain)" ]]; then
            git add package.json package-lock.json
            git commit -m "chore(deps): rename to MenuSnap, remove legacy tags, and update all packages"
            git push
          else
            echo "No changes detected"
          fi
