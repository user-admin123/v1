name: "MenuSnap: Cleanup & Maintenance"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  maintenance:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Remove unwanted packages
        run: |
          npm uninstall lovable-tagger html-to-image
          echo "Successfully removed legacy/unwanted packages"

      - name: Safe Update (Minor & Patch only)
        run: |
          # 'npm update' respects your package.json version ranges.
          # It won't jump from React 18 to 19 or Vite 5 to 8.
          npm update
          # Use --legacy-peer-deps only as a fallback for strict plugin checks
          npm install --legacy-peer-deps
          echo "Dependencies refreshed to latest stable versions (no major jumps)"

      - name: Commit and Push changes
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          
          if [[ -n "$(git status --porcelain)" ]]; then
            git add package.json package-lock.json
            git commit -m "chore: cleanup unwanted packages and sync lockfile"
            git push
          else
            echo "No changes detected"
          fi
